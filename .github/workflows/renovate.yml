name: Renovate

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Run Renovate
        uses: renovatebot/github-action@v40.1.11
        with:
          configurationFile: renovate.json
          token: ${{ secrets.GITHUB_TOKEN }}